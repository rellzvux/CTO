<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanzz Xiters UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a0015 0%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 25px;
            position: relative;
            background: linear-gradient(180deg, rgba(0,0,0,0) 60%, #7a00cc 150%);
        }

        /* --- LOGO CTO --- */
        .logo-wrapper {
            margin-top: 10px;
            margin-bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            animation: float 3s infinite ease-in-out;
        }

        .cto-svg {
            width: 280px;
            max-width: 90%;
            filter: drop-shadow(0 0 15px rgba(157, 0, 255, 0.7));
        }

        .cto-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 200px;
            letter-spacing: 15px;
            fill: #ffffff;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- BRANDING --- */
        .brand-name {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #ffffff;
            text-transform: uppercase;
            font-style: italic;
            text-shadow: 2px 2px 0px #9d00ff;
        }

        .banner-image {
            width: 100%;
            height: 65px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #444;
            margin-bottom: 20px;
            background: url('https://i.ibb.co/VWVXz7B/anime-placeholder.jpg') center/cover;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .instruction-text {
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            color: #ccc;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* --- BUTTONS --- */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 55px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-login {
            background-color: #9d00ff;
            color: white;
            border: none;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.5);
        }

        .btn-support {
            background-color: transparent;
            color: #bc4dff;
            border: 2px solid #9d00ff;
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        /* --- FOOTER --- */
        .footer {
            margin-top: auto;
            text-align: center;
            padding-bottom: 20px;
            width: 100%;
        }

        .contact-label {
            font-size: 16px;
            color: #bbb;
            margin-bottom: 15px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .social-row a {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-row svg {
            width: 28px;
            height: 28px;
            fill: #9d00ff;
            transition: 0.3s;
        }

        .social-row svg:hover {
            fill: #ffffff;
            filter: drop-shadow(0 0 8px #9d00ff);
        }

        .credits-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
